server:
  port: 8080
spring:
  application:
    name: app-loteria

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/lottery_db
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgre}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto:

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

app:
  cors:
    allowed-origins: "http://localhost:5173"